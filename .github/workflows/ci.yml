name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

  bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck bot
        run: npx tsc --noEmit --pretty false

      - name: Bot CLI smoke check
        run: npm run bot -- --help

  garaga-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate garaga server syntax
        run: python -m py_compile scripts/garaga-server.py
